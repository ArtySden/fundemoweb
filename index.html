<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descargar Roblox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 90%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }
        
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .btn-download {
            display: inline-block;
            background: #00a2ff;
            color: white;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            transition: background 0.3s ease;
            border: none;
            cursor: pointer;
        }
        
        .btn-download:hover {
            background: #0085cc;
        }
        
        .loading {
            color: #999;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Roblox</h1>
        <p>Estamos redirigiendo a la descarga de Roblox...</p>
        
        <a href="https://www.roblox.com/download" class="btn-download">
            Descargar ahora
        </a>
        
        <div class="loading">
            Si no se redirige automáticamente, haz clic en el botón anterior.
        </div>
    </div>

    <script>
        // Redirige automáticamente después de 2 segundos
        setTimeout(function() {
            window.location.href = 'https://www.roblox.com/download';
        }, 2000);
    </script>
</body>
</html>
